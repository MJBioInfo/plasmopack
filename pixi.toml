# Pixi environment + task runner for plasmopack.
# Pixi gives us one reproducible lockfile across Mac (arm64), Linux, and Windows,
# and handles conda-world bioinformatics deps alongside PyPI packages.

[workspace]
name = "plasmopack"
version = "0.1.0.dev0"
description = "AnnData-native toolkit for Plasmodium and VEuPathDB organism bioinformatics"
authors = ["Majeed Jamakhani <mjbioinfo@gmail.com>"]
channels = ["conda-forge", "bioconda"]
platforms = ["osx-arm64", "osx-64", "linux-64", "win-64"]

[dependencies]
python = ">=3.11,<3.14"

# Install the package itself in editable mode via pip.
[pypi-dependencies]
plasmopack = { path = ".", editable = true }

# ---------------------------------------------------------------------------
# Feature groups map to the pyproject optional-dependencies.
# ---------------------------------------------------------------------------
[feature.dev.pypi-dependencies]
pytest = ">=8.0"
pytest-cov = ">=5.0"
vcrpy = ">=6.0"
hypothesis = ">=6.100"
ruff = ">=0.6"
mypy = ">=1.11"

[feature.docs.pypi-dependencies]
mkdocs-material = ">=9.5"
mkdocstrings = { version = ">=0.26", extras = ["python"] }
mkdocs-jupyter = ">=0.25"

[environments]
default = { solve-group = "default" }
dev = { features = ["dev"], solve-group = "default" }
docs = { features = ["docs"], solve-group = "default" }

# ---------------------------------------------------------------------------
# Tasks — run with `pixi run <task>`
# ---------------------------------------------------------------------------
[tasks]
test = "pytest"
test-cov = "pytest --cov=plasmopack --cov-report=term-missing"
lint = "ruff check src tests"
format = "ruff format src tests"
format-check = "ruff format --check src tests"
typecheck = "mypy src/plasmopack"
docs-build = "mkdocs build"
docs-serve = "mkdocs serve"
# One command to run everything CI runs.
check = { depends-on = ["lint", "format-check", "typecheck", "test"] }
